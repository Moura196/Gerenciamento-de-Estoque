<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Estoque</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-color: #4e73df;
            --secondary-color: #2e59d9;
        }
        
        body {
            background: linear-gradient(135deg, #f8f9fc 0%, #d1d9f0 100%);
            height: 100vh;
        }
        
        .login-card {
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border: none;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        
        .login-card:hover {
            transform: translateY(-5px);
        }
        
        .card-header {
            background: var(--primary-color);
            color: white;
            text-align: center;
            padding: 1.5rem;
        }
        
        .card-body {
            padding: 2rem;
        }
        
        .form-control {
            padding-left: 2.5rem;
            border-radius: 5px;
        }
        
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #6e707e;
            z-index: 5;
        }
        
        .btn-login {
            background: var(--primary-color);
            border: none;
            padding: 0.5rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }
        
        .btn-login:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }
        
        .footer-links {
            font-size: 0.85rem;
        }
    </style>
</head>
<body class="d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="login-card card">
                    <div class="card-header">
                        <i class="bi bi-box-seam fs-1"></i>
                        <h3 class="h4 my-2">Sistema de Estoque</h3>
                        <p class="mb-0 small">Acesse sua conta</p>
                    </div>
                    <div class="card-body">
                        <form id="loginForm">
                            <div class="mb-3 position-relative">
                                <i class="bi bi-person-badge input-icon"></i>
                                <input type="text" class="form-control ps-4" id="matricula" name="matricula" 
                                       placeholder="Digite sua matrícula" required>
                            </div>
                            
                            <div class="mb-4 position-relative">
                                <i class="bi bi-lock-fill input-icon"></i>
                                <input type="password" class="form-control ps-4" id="senha" name="senha" 
                                       placeholder="Digite sua senha" required>
                            </div>
                            
                            <button type="submit" class="btn btn-login btn-primary w-100 mb-3">
                                <i class="bi bi-box-arrow-in-right me-2"></i>
                                Entrar
                            </button>
                            
                            <div class="text-center footer-links">
                                <a href="#" class="text-decoration-none me-2">Esqueci minha senha</a>
                                <span class="text-muted">|</span>
                                <a href="#" class="text-decoration-none ms-2">Ajuda</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/assets/js/views/login.view.js"></script>
    
    <script>
        document.querySelectorAll('.form-control').forEach(input => {
            input.addEventListener('focus', function() {
                this.previousElementSibling.style.color = 'var(--primary-color)';
            });
            
            input.addEventListener('blur', function() {
                this.previousElementSibling.style.color = '#6e707e';
            });
        });
    </script>
</body>
</html>
