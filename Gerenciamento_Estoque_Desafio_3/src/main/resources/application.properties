spring.application.name=Gerenciamento_Estoque_Desafio_3
#spring.flyway.enabled=true
#spring.flyway.locations=classpath:db/migration
#spring.flyway.baseline-on-migrate=true
#Os 6 a baixo devem ser desabilitados em produção.
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0
spring.groovy.template.cache=false
spring.devtools.restart.additional-paths=src/main/resources/static
spring.devtools.livereload.enabled=true

# Ativa o profile de desenvolvimento excluir em produção
spring.profiles.active=dev

# Banco PostgreSQL
spring.datasource.url=jdbc:postgresql://db:5432/gerenciamento_estoque
spring.datasource.username=postgres
spring.datasource.password=12345678
# application-docker.properties
spring.datasource.url=jdbc:postgresql://db:5432/gerenciamento_estoque

# Hibernate - Geração do schema
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.default_schema=public
spring.rsocket.server.port=8080

springdoc.swagger-ui.path=swagger-ui
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE